<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>রাহী অনলাইন POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-center text-blue-600 font-mono">RAHI POS SYSTEM</h1>
        
        <div id="status-message" class="text-center p-2 mb-4 text-sm rounded bg-blue-100 text-blue-700">
            ডাটাবেস কানেক্ট করা হচ্ছে...
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="product-grid" class="grid grid-cols-2 gap-2">
                </div>
            <div class="border-l pl-4">
                <h2 class="font-bold mb-2 underline">বিলিং সেকশন</h2>
                <div id="cart" class="min-h-[150px] border-b mb-2 text-sm italic text-gray-600">আইটেম যোগ করুন...</div>
                <div class="text-2xl font-black text-green-600">মোট: ৳<span id="total">0</span></div>
                <button onclick="location.reload()" class="mt-4 text-xs text-blue-400">রিফ্রেশ করুন</button>
            </div>
        </div>
    </div>

    <script>
        // আপনার প্রোজেক্টের সঠিক তথ্য
        const PROJECT_URL = 'https://lowdgwnphuptwwoqvyid.supabase.co';
        const PUBLIC_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxvd2Rnd25waHVwdHd3b3F2eWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDAzNTUsImV4cCI6MjA4ODU3NjM1NX0.2_YgZ9n3qoAhXW6yveMRNtLaQAM8Vk7-1YFUFe0LWXE';
        
        // এখানে নাম পরিবর্তন করা হয়েছে যাতে এরর না আসে
        const myApp = supabase.createClient(PROJECT_URL, PUBLIC_KEY);

        async function startApp() {
            const status = document.getElementById('status-message');
            try {
                const { data, error } = await myApp.from('products').select('*');
                
                if (error) {
                    status.innerHTML = "Error: " + error.message;
                    status.classList.add('bg-red-100', 'text-red-700');
                    return;
                }

                status.innerHTML = "অনলাইন ডাটাবেস সচল আছে!";
                status.classList.replace('bg-blue-100', 'bg-green-100');
                status.classList.replace('text-blue-700', 'text-green-700');

                const grid = document.getElementById('product-grid');
                if (data.length === 0) {
                    grid.innerHTML = "<p class='col-span-2 text-gray-400 text-center'>কোনো পণ্য পাওয়া যায়নি।</p>";
                } else {
                    grid.innerHTML = data.map(p => `
                        <button onclick="addToBill('${p.name}', ${p.price})" class="p-4 bg-white border-2 border-blue-200 rounded-lg shadow-sm hover:border-blue-500 transition-all text-left">
                            <span class="font-bold block">${p.name}</span>
                            <span class="text-blue-600 italic">৳${p.price}</span>
                        </button>
                    `).join('');
                }
            } catch (e) {
                status.innerHTML = "ইন্টারনেট কানেকশন চেক করুন!";
            }
        }

        let totalAmount = 0;
        function addToBill(name, price) {
            const cartDiv = document.getElementById('cart');
            if (totalAmount === 0) cartDiv.innerHTML = ""; 
            
            totalAmount += price;
            cartDiv.innerHTML += `<div class="flex justify-between border-b py-1"><span>${name}</span> <span>৳${price}</span></div>`;
            document.getElementById('total').innerText = totalAmount;
        }

        startApp();
    </script>
</body>
</html>
