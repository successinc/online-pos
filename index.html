<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>রাহী অনলাইন POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-center text-blue-600 font-mono">RAHI POS SYSTEM</h1>
        
        <div id="status-message" class="text-center p-2 mb-4 text-sm rounded bg-yellow-100 text-yellow-700">
            ডাটাবেস চেক করা হচ্ছে...
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="product-grid" class="grid grid-cols-2 gap-2">
                </div>
            <div class="border-l pl-4">
                <h2 class="font-bold mb-2">বিলিং</h2>
                <div id="cart" class="min-h-[100px] border-b mb-2"></div>
                <div class="text-xl font-bold">মোট: ৳<span id="total">0</span></div>
            </div>
        </div>
    </div>

    <script>
        const URL = 'https://lowdgwnphuptwwoqvyid.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxvd2Rnd25waHVwdHd3b3F2eWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDAzNTUsImV4cCI6MjA4ODU3NjM1NX0.2_YgZ9n3qoAhXW6yveMRNtLaQAM8Vk7-1YFUFe0LWXE';
        
        const supabase = supabase.createClient(URL, KEY);

        async function init() {
            const msg = document.getElementById('status-message');
            try {
                const { data, error } = await supabase.from('products').select('*');
                
                if (error) {
                    msg.innerHTML = "ভুল হয়েছে: " + error.message;
                    msg.className = "text-center p-2 mb-4 bg-red-100 text-red-700";
                    return;
                }

                if (data.length === 0) {
                    msg.innerHTML = "ডাটাবেসে কোনো পণ্য খুঁজে পাওয়া যায়নি!";
                    return;
                }

                msg.innerHTML = "সফলভাবে কানেক্ট হয়েছে!";
                msg.className = "text-center p-2 mb-4 bg-green-100 text-green-700";

                document.getElementById('product-grid').innerHTML = data.map(p => `
                    <button onclick="add('${p.name}', ${p.price})" class="p-3 bg-blue-500 text-white rounded shadow hover:bg-blue-600">
                        ${p.name}<br>৳${p.price}
                    </button>
                `).join('');
            } catch (e) {
                msg.innerHTML = "কানেকশন ফেইলড!";
            }
        }

        let total = 0;
        function add(n, p) {
            total += p;
            document.getElementById('cart').innerHTML += `<p>${n} - ৳${p}</p>`;
            document.getElementById('total').innerText = total;
        }

        init();
    </script>
</body>
</html>
