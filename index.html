<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visa Agency POS - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border">
            <div class="text-center mb-6">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-shield text-blue-600 text-3xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Agency Login</h2>
                <p class="text-gray-500 text-sm">সফটওয়্যারে প্রবেশ করতে লগইন করুন</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">Login Now</button>
            </div>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden text-center font-medium">❌ ভুল ইউজারনেম বা পাসওয়ার্ড!</p>
        </div>
    </div>

    <div id="dashboardPage" class="hidden">
        <nav class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold flex items-center italic">
                    <i class="fas fa-plane-departure mr-2 text-blue-400"></i> VISA POS
                </h1>
                <button onclick="handleLogout()" class="text-gray-300 hover:text-white flex items-center text-sm">
                    Logout <i class="fas fa-sign-out-alt ml-2"></i>
                </button>
            </div>
        </nav>

        <div class="container mx-auto p-4 md:p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">Total Clients</p>
                    <h3 id="statTotalClients" class="text-3xl font-bold text-gray-800">0</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-green-500 text-sm font-medium uppercase tracking-wider">Received Amount</p>
                    <h3 id="statTotalReceived" class="text-3xl font-bold text-green-600">0 TK</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-red-500 text-sm font-medium uppercase tracking-wider">Total Outstanding Due</p>
                    <h3 id="statTotalDue" class="text-3xl font-bold text-red-600">0 TK</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
                        <h2 class="text-lg font-bold mb-5 text-gray-700 flex items-center">
                            <i class="fas fa-plus-circle mr-2 text-blue-500"></i> New Entry
                        </h2>
                        <form id="visaForm" class="space-y-4">
                            <div>
                                <label class="text-xs font-bold text-gray-500 ml-1">Client Name / Details</label>
                                <input type="text" id="cName" placeholder="e.g. Moldova Group" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-blue-500" required>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-500 ml-1">Service Particulars</label>
                                <input type="text" id="cService" placeholder="e.g. 10 Visa Online" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-blue-500" required>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-xs font-bold text-gray-500 ml-1">Total Bill</label>
                                    <input type="number" id="cTotal" placeholder="0.00" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-blue-500" required>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-gray-500 ml-1">Paid Now</label>
                                    <input type="number" id="cPaid" placeholder="0.00" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-blue-500" required>
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-black transition shadow-lg">
                                Save Transaction
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                            <h2 class="font-bold text-gray-700">Recent Accounts</h2>
                            <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-bold">Live Cloud</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50 text-gray-400 text-xs uppercase tracking-widest font-bold">
                                    <tr>
                                        <th class="p-4">Details</th>
                                        <th class="p-4">Particulars</th>
                                        <th class="p-4 text-center">Total Bill</th>
                                        <th class="p-4 text-center">Paid</th>
                                        <th class="p-4 text-center">Due</th>
                                        <th class="p-4 text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="clientTableBody" class="text-sm text-gray-600 divide-y">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- আপনার নির্দিষ্ট FIREBASE URL ---
        const BASE_URL = "https://myvisaagency-af8f1-default-rtdb.firebaseio.com/agency";
        
        // --- লগইন সেটিংস (আপনি পরে পরিবর্তন করতে পারবেন) ---
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "123";

        // Auth
        function handleLogin() {
            if(document.getElementById('username').value === ADMIN_USER && document.getElementById('password').value === ADMIN_PASS) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                fetchData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function handleLogout() { location.reload(); }

        // Save Data
        document.getElementById('visaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const record = {
                name: document.getElementById('cName').value,
                service: document.getElementById('cService').value,
                total: parseFloat(document.getElementById('cTotal').value),
                paid: parseFloat(document.getElementById('cPaid').value),
                due: parseFloat(document.getElementById('cTotal').value) - parseFloat(document.getElementById('cPaid').value),
                date: new Date().toLocaleDateString()
            };

            await fetch(`${BASE_URL}.json`, { method: 'POST', body: JSON.stringify(record) });
            document.getElementById('visaForm').reset();
            fetchData();
        });

        // Load Data
        async function fetchData() {
            const res = await fetch(`${BASE_URL}.json`);
            const data = await res.json();
            const table = document.getElementById('clientTableBody');
            table.innerHTML = '';
            
            let tCount = 0, tPaid = 0, tDue = 0;

            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const c = data[key];
                    tCount++; tPaid += c.paid; tDue += c.due;

                    table.innerHTML += `
                        <tr class="hover:bg-blue-50/50 transition">
                            <td class="p-4 font-bold text-gray-800">${c.name}<br><span class="text-[10px] text-gray-400 font-normal">${c.date}</span></td>
                            <td class="p-4">${c.service}</td>
                            <td class="p-4 text-center font-medium">${c.total.toLocaleString()}</td>
                            <td class="p-4 text-center text-green-600 font-bold">${c.paid.toLocaleString()}</td>
                            <td class="p-4 text-center text-red-600 font-bold">${c.due.toLocaleString()}</td>
                            <td class="p-4 text-center">
                                <button onclick="deleteRecord('${key}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            }
            document.getElementById('statTotalClients').innerText = tCount;
            document.getElementById('statTotalReceived').innerText = tPaid.toLocaleString() + ' TK';
            document.getElementById('statTotalDue').innerText = tDue.toLocaleString() + ' TK';
        }

        async function deleteRecord(key) {
            if(confirm('Delete this record?')) {
                await fetch(`${BASE_URL}/${key}.json`, { method: 'DELETE' });
                fetchData();
            }
        }
    </script>
</body>
</html>
