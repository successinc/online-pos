<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাহী ডিজিটাল সার্ভিস | অনলাইন অর্ডার</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Hind Siliguri', sans-serif; background-color: #f9fafb; }</style>
</head>
<body class="min-h-screen">

    <header class="bg-white border-b-4 border-blue-600 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-800 tracking-tighter uppercase">RAHI DIGITAL SERVICE</h1>
            <button onclick="showAdmin()" class="text-[9px] font-bold text-gray-300 hover:text-blue-500">ADMIN</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
        
        <div class="lg:col-span-2 space-y-4">
            <div id="status-info" class="text-xs text-center p-2 rounded bg-blue-50 text-blue-500 mb-2">ডাটাবেস চেক করা হচ্ছে...</div>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                </div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 sticky top-24">
                <h3 class="text-lg font-bold mb-4 border-b pb-2">🛒 আপনার কার্ট</h3>
                <div id="cart-list" class="space-y-3 min-h-[150px] mb-6 text-sm text-gray-400 italic text-center py-10">কোনো সার্ভিস যোগ করা হয়নি</div>
                <div class="border-t pt-4">
                    <div class="flex justify-between text-2xl font-black text-blue-900 mb-6">
                        <span>মোট:</span>
                        <span>৳<span id="total-val">0</span></span>
                    </div>
                    <button onclick="openPaymentModal()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 shadow-lg transition active:scale-95">পেমেন্ট করুন</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const URL = 'https://lowdgwnphuptwwoqvyid.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxvd2Rnd25waHVwdHd3b3F2eWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDAzNTUsImV4cCI6MjA4ODU3NjM1NX0.2_YgZ9n3qoAhXW6yveMRNtLaQAM8Vk7-1YFUFe0LWXE';
        
        // সঠিক ক্লায়েন্ট তৈরি
        const client = supabase.createClient(URL, KEY);
        let cart = [];

        async function loadData() {
            const status = document.getElementById('status-info');
            const grid = document.getElementById('product-grid');
            
            try {
                // ১. চেক করা হচ্ছে টেবিল থেকে ডাটা আসছে কি না
                const { data, error } = await client.from('products').select('*');

                if (error) {
                    status.innerHTML = "Error: " + error.message + " (সুপাবেজ টেবিল বা পলিসি চেক করুন)";
                    status.className = "text-xs text-center p-2 rounded bg-red-100 text-red-600 mb-2";
                    return;
                }

                if (!data || data.length === 0) {
                    status.innerHTML = "ডাটাবেসে কোনো পণ্য পাওয়া যায়নি! Supabase-এ ডাটা যোগ করুন।";
                    return;
                }

                status.innerHTML = "অনলাইন ডাটাবেস সচল আছে!";
                status.className = "text-xs text-center p-2 rounded bg-green-100 text-green-600 mb-2";

                grid.innerHTML = data.map(p => `
                    <div onclick="add('${p.id}', '${p.name}', ${p.price})" class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm hover:border-blue-500 hover:shadow-md transition cursor-pointer flex justify-between items-center">
                        <div><p class="font-bold text-gray-800">${p.name}</p><p class="text-blue-600 font-black">৳${p.price}</p></div>
                        <div class="bg-blue-50 text-blue-600 w-8 h-8 flex items-center justify-center rounded-full font-bold">+</div>
                    </div>
                `).join('');

            } catch (err) {
                status.innerHTML = "কানেকশন ফেইলড! ইন্টারনেট চেক করুন।";
            }
        }

        function add(id, name, price) {
            const item = cart.find(i => i.id === id);
            if (item) item.qty++;
            else cart.push({ id, name, price, qty: 1 });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const total = document.getElementById('total-val');
            if (cart.length === 0) {
                list.innerHTML = "কোনো সার্ভিস যোগ করা হয়নি";
                total.innerText = 0; return;
            }
            list.innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="font-medium">${i.name} (x${i.qty})</span>
                    <span class="font-bold text-blue-700">৳${i.price * i.qty}</span>
                </div>
            `).join('');
            total.innerText = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        }

        // পেমেন্ট মোডাল ফাংশনগুলো আগের কোড থেকেই থাকবে...
        // ... (বিকাশ/উপায় ফাংশন)

        loadData();
    </script>
</body>
</html>
