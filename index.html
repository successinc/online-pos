<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাহী ডিজিটাল POS | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        @media print {
            body * { visibility: hidden; }
            #receipt-print, #receipt-print * { visibility: visible; }
            #receipt-print { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">রাহী ভিসা সার্ভিস POS</h1>
            <div class="flex gap-4">
                <button onclick="toggleModal('product-modal')" class="bg-blue-700 px-4 py-2 rounded-lg hover:bg-blue-600">➕ নতুন পণ্য</button>
                <div class="font-mono bg-blue-800 px-3 py-1 rounded">ADMIN: MA HRAHI</div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-4">
            <input type="text" id="search" onkeyup="filterProducts()" placeholder="খুঁজুন..." class="w-full p-3 rounded-xl border-2 border-slate-200 outline-none focus:border-blue-500">
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100 h-fit">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">🛒 বর্তমান বিল</h2>
            <div id="cart-list" class="space-y-3 min-h-[200px] mb-6">
                <p class="text-slate-400 text-center py-10">কোনো আইটেম নেই</p>
            </div>
            <div class="border-t pt-4 space-y-3">
                <div class="flex justify-between text-2xl font-black text-green-700">
                    <span>মোট:</span>
                    <span>৳<span id="total-val">0</span></span>
                </div>
                <button onclick="processSale()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-xl hover:bg-green-700 transition">পেমেন্ট ও প্রিন্ট</button>
            </div>
        </div>
    </main>

    <div id="product-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">নতুন সার্ভিস যোগ করুন</h3>
            <input type="text" id="new-p-name" placeholder="নাম (যেমন: দুবাই ভিসা)" class="w-full p-2 mb-3 border rounded">
            <input type="number" id="new-p-price" placeholder="দাম (টাকায়)" class="w-full p-2 mb-4 border rounded">
            <div class="flex gap-2">
                <button onclick="saveProduct()" class="flex-1 bg-blue-600 text-white py-2 rounded">সেভ করুন</button>
                <button onclick="toggleModal('product-modal')" class="flex-1 bg-gray-200 py-2 rounded">বন্ধ</button>
            </div>
        </div>
    </div>

    <div id="receipt-print" class="hidden p-8 text-center border font-mono">
        <h2 class="text-xl font-bold">রাহী ভিসা সার্ভিস</h2>
        <p class="text-sm">সিলেট, বাংলাদেশ</p>
        <hr class="my-2 border-dashed">
        <div id="receipt-items" class="text-left text-sm mb-4"></div>
        <hr class="my-2 border-dashed">
        <p class="text-lg font-bold">মোট: ৳<span id="receipt-total">0</span></p>
        <p class="mt-4 text-xs italic">ধন্যবাদ, আবার আসবেন!</p>
    </div>

    <script>
        const URL = 'https://lowdgwnphuptwwoqvyid.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxvd2Rnd25waHVwdHd3b3F2eWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDAzNTUsImV4cCI6MjA4ODU3NjM1NX0.2_YgZ9n3qoAhXW6yveMRNtLaQAM8Vk7-1YFUFe0LWXE';
        const db = supabase.createClient(URL, KEY);
        
        let products = [];
        let cart = [];

        async function load() {
            const { data } = await db.from('products').select('*');
            products = data || [];
            renderProducts(products);
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div onclick="add('${p.id}', '${p.name}', ${p.price})" class="cursor-pointer bg-white p-4 rounded-xl border hover:border-blue-500 shadow-sm transition">
                    <p class="font-bold text-slate-700">${p.name}</p>
                    <p class="text-blue-600 font-bold">৳${p.price}</p>
                </div>
            `).join('');
        }

        function filterProducts() {
            const q = document.getElementById('search').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(q)));
        }

        function add(id, name, price) {
            const item = cart.find(i => i.id === id);
            if (item) item.qty++;
            else cart.push({ id, name, price, qty: 1 });
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            const total = document.getElementById('total-val');
            
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-slate-400 text-center py-10">কোনো আইটেম নেই</p>';
                total.innerText = 0;
                return;
            }

            list.innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center text-sm border-b pb-2">
                    <div><b>${i.name}</b><br><span class="text-xs">৳${i.price} x ${i.qty}</span></div>
                    <div class="font-bold">৳${i.price * i.qty}</div>
                    <button onclick="remove(${idx})" class="text-red-400 font-bold px-2">×</button>
                </div>
            `).join('');
            
            const sum = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            total.innerText = sum.toLocaleString('bn-BD');
            document.getElementById('receipt-total').innerText = sum;
        }

        function remove(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        async function saveProduct() {
            const name = document.getElementById('new-p-name').value;
            const price = document.getElementById('new-p-price').value;
            if(!name || !price) return alert("সব ঘর পূরণ করুন!");
            
            const { error } = await db.from('products').insert([{ name, price: Number(price) }]);
            if (error) alert(error.message);
            else {
                alert("পণ্য যোগ হয়েছে!");
                toggleModal('product-modal');
                load();
            }
        }

        function processSale() {
            if (cart.length === 0) return alert("কার্ট খালি!");
            
            // রশিদ তৈরি
            document.getElementById('receipt-items').innerHTML = cart.map(i => `<p>${i.name} - ${i.qty} x ৳${i.price} = ৳${i.qty*i.price}</p>`).join('');
            
            // প্রিন্ট কমান্ড
            window.print();
            
            alert("বিক্রয় সম্পন্ন হয়েছে!");
            cart = [];
            updateCart();
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        load();
    </script>
</body>
</html>
