<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাহী ডিজিটাল সার্ভিস | POS & Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white border-b-4 border-blue-600 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-800 tracking-tight">RAHI POS SYSTEM</h1>
            <button onclick="adminLogin()" class="text-[10px] text-gray-400 font-bold uppercase hover:text-blue-500 transition">Admin Panel</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
        <div class="lg:col-span-2 space-y-4">
            <div id="status-box" class="text-center p-3 rounded-xl text-xs font-bold bg-blue-100 text-blue-600">ডাটাবেস চেক করা হচ্ছে...</div>
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-gray-100 sticky top-24">
                <h3 class="text-lg font-bold mb-6">🛒 অর্ডার লিস্ট</h3>
                <div id="cart-container" class="min-h-[150px] mb-8 space-y-3 text-center py-10 text-gray-400 italic">কোনো আইটেম নেই</div>
                <div class="border-t pt-6">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-gray-500 font-bold">মোট বিল:</span>
                        <span class="text-4xl font-black text-blue-700">৳<span id="total-price">0</span></span>
                    </div>
                    <button onclick="showPayment()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition active:scale-95">পেমেন্ট করুন</button>
                </div>
            </div>
        </div>
    </main>

    <div id="pay-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-md relative animate-in zoom-in-95">
            <h3 class="text-2xl font-bold mb-6 text-center">বিকাশ/উপায় পেমেন্ট</h3>
            <div class="bg-blue-50 p-6 rounded-3xl text-center mb-6 border-2 border-dashed border-blue-200">
                <p class="text-sm font-bold text-blue-500 mb-2 italic">এই নাম্বারে টাকা পাঠান (Send Money):</p>
                <p class="text-3xl font-black text-blue-900 tracking-wider">01799072987</p>
            </div>
            <input type="text" id="trx-input" placeholder="TrxID দিন" class="w-full p-4 border-2 rounded-2xl text-center font-bold uppercase mb-4 outline-none focus:border-blue-500">
            <button onclick="confirmCheckout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg">অর্ডার কনফার্ম</button>
            <button onclick="closeModal('pay-modal')" class="absolute top-6 right-6 text-gray-400 text-xl">✕</button>
        </div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-slate-900/95 flex items-center justify-center p-4 z-[200]">
        <div class="bg-white p-8 rounded-[35px] w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col relative">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-gray-800 italic uppercase">Admin Report</h2>
                <button onclick="closeModal('admin-modal')" class="bg-red-50 p-3 rounded-full text-red-500 hover:bg-red-100 transition">✕</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-blue-600 p-8 rounded-[30px] text-white shadow-xl shadow-blue-200">
                    <p class="text-xs font-bold uppercase opacity-80 mb-2 tracking-widest">মোট বিক্রি</p>
                    <p id="total-sales-count" class="text-5xl font-black">0</p>
                </div>
                <div class="bg-green-600 p-8 rounded-[30px] text-white shadow-xl shadow-green-200">
                    <p class="text-xs font-bold uppercase opacity-80 mb-2 tracking-widest">মোট আয়</p>
                    <p id="total-revenue" class="text-5xl font-black">৳0</p>
                </div>
            </div>

            <div id="sales-log" class="flex-grow overflow-y-auto space-y-4 pr-2">
                <p class="text-center text-gray-400 animate-pulse py-10">ডাটা লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://lowdgwnphuptwwoqvyid.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxvd2Rnd25waHVwdHd3b3F2eWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDAzNTUsImV4cCI6MjA4ODU3NjM1NX0.2_YgZ9n3qoAhXW6yveMRNtLaQAM8Vk7-1YFUFe0LWXE';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let myCart = [];

        async function fetchProducts() {
            const status = document.getElementById('status-box');
            try {
                const { data, error } = await supabaseClient.from('products').select('*');
                if (error) throw error;
                status.innerText = "ডাটাবেস কানেক্টেড!";
                status.className = "text-center p-3 rounded-xl text-xs font-bold bg-green-100 text-green-600 mb-4";
                document.getElementById('product-list').innerHTML = data.map(p => `
                    <div onclick="addToCart('${p.id}', '${p.name}', ${p.price})" class="bg-white p-6 rounded-3xl border-2 border-transparent hover:border-blue-500 shadow-sm hover:shadow-xl transition cursor-pointer flex justify-between items-center group">
                        <div>
                            <p class="font-bold text-gray-800 text-lg group-hover:text-blue-700 transition">${p.name}</p>
                            <p class="text-blue-600 font-black text-xl italic">৳${p.price.toLocaleString('bn-BD')}</p>
                        </div>
                        <div class="bg-blue-50 text-blue-600 w-10 h-10 flex items-center justify-center rounded-2xl font-bold group-hover:bg-blue-600 group-hover:text-white transition-all">+</div>
                    </div>
                `).join('');
            } catch (e) {
                status.innerText = "Error: " + e.message;
                status.className = "text-center p-3 rounded-xl text-xs font-bold bg-red-100 text-red-600 mb-4";
            }
        }

        function addToCart(id, name, price) {
            const exists = myCart.find(i => i.id === id);
            if (exists) exists.qty++;
            else myCart.push({ id, name, price, qty: 1 });
            renderUI();
        }

        function renderUI() {
            const container = document.getElementById('cart-container');
            const totalDisplay = document.getElementById('total-price');
            if (myCart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10 italic">কোনো আইটেম নেই</p>';
                totalDisplay.innerText = 0; return;
            }
            container.innerHTML = myCart.map((item, idx) => `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <div><span class="font-bold text-gray-800">${item.name}</span><p class="text-[10px] text-gray-400 font-bold uppercase">৳${item.price} x ${item.qty}</p></div>
                    <div class="flex items-center gap-3"><span class="font-black text-blue-700">৳${item.price * item.qty}</span><button onclick="removeItem(${idx})" class="text-red-300 hover:text-red-600">✕</button></div>
                </div>
            `).join('');
            totalDisplay.innerText = myCart.reduce((acc, i) => acc + (i.price * i.qty), 0).toLocaleString('bn-BD');
        }

        function removeItem(idx) { myCart.splice(idx, 1); renderUI(); }
        function showPayment() { if(myCart.length > 0) document.getElementById('pay-modal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function confirmCheckout() {
            const trx = document.getElementById('trx-input').value;
            if(!trx) return alert("TrxID দিন!");
            const totalSum = myCart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            const { error } = await supabaseClient.from('sales').insert([{ 
                product_id: myCart[0].id, quantity: myCart.reduce((acc, i) => acc + i.qty, 0), total_price: totalSum 
            }]);
            if (error) alert("ভুল হয়েছে: " + error.message);
            else { alert("অর্ডার সফল! যাচাই করা হচ্ছে।"); myCart = []; renderUI(); closeModal('pay-modal'); document.getElementById('trx-input').value = ''; }
        }

        // অ্যাডমিন ফাংশন (যেখানে সমস্যা হচ্ছিল)
        async function adminLogin() {
            const p = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");
            if (p === 'rahi2026') {
                document.getElementById('admin-modal').classList.remove('hidden');
                loadAdminReport();
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        }

        async function loadAdminReport() {
            const log = document.getElementById('sales-log');
            const { data, error } = await supabaseClient.from('sales').select('*').order('created_at', { ascending: false });
            
            if (data) {
                const totalRev = data.reduce((s, i) => s + i.total_price, 0);
                document.getElementById('total-sales-count').innerText = data.length;
                document.getElementById('total-revenue').innerText = "৳" + totalRev.toLocaleString('bn-BD');
                
                log.innerHTML = data.map(s => `
                    <div class="bg-gray-50 p-5 rounded-3xl flex justify-between items-center border border-gray-100 shadow-sm">
                        <div>
                            <span class="text-[10px] font-black text-gray-400 block tracking-widest uppercase">ID: #${s.id.slice(0,6)}</span>
                            <span class="text-sm font-bold text-gray-600">${new Date(s.created_at).toLocaleString('bn-BD')}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-xl font-black text-green-600 italic">৳${s.total_price.toLocaleString('bn-BD')}</span>
                            <p class="text-[10px] text-gray-400 font-bold">আইটেম: ${s.quantity}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                log.innerHTML = `<p class="text-center text-red-500">কোনো ডাটা পাওয়া যায়নি!</p>`;
            }
        }

        fetchProducts();
    </script>
</body>
</html>
