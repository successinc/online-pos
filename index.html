<div id="admin-panel" class="hidden fixed inset-0 bg-slate-900/95 flex items-center justify-center p-4 z-[200] backdrop-blur-md">
    <div class="bg-white w-full max-w-4xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
        
        <div id="admin-login-ui" class="p-10 flex flex-col items-center justify-center space-y-6">
            <div class="bg-blue-100 p-4 rounded-full text-3xl">🔐</div>
            <h2 class="text-2xl font-black text-gray-800">অ্যাডমিন লগইন</h2>
            <div class="w-full max-w-xs space-y-4">
                <input type="text" id="admin-user" placeholder="ইউজারনেম" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-500 font-bold">
                <input type="password" id="admin-pass" placeholder="পাসওয়ার্ড" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-500 font-bold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition">প্রবেশ করুন</button>
            </div>
            <button onclick="closeAdmin()" class="text-gray-400 text-sm hover:underline">ফিরে যান</button>
        </div>

        <div id="admin-report-ui" class="hidden flex flex-col h-full">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50">
                <div>
                    <h2 class="text-2xl font-black text-blue-900">ব্যবসায়িক রিপোর্ট</h2>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">Rahi Digital Service Database</p>
                </div>
                <button onclick="closeAdmin()" class="bg-red-50 text-red-500 p-3 rounded-full hover:bg-red-100">✕</button>
            </div>
            
            <div class="p-8 overflow-y-auto space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-lg">
                        <p class="text-xs font-bold opacity-80 uppercase">মোট বিক্রয়</p>
                        <p id="total-count" class="text-4xl font-black italic">0</p>
                    </div>
                    <div class="bg-emerald-600 p-6 rounded-3xl text-white shadow-lg">
                        <p class="text-xs font-bold opacity-80 uppercase">মোট আয়</p>
                        <p id="total-money" class="text-4xl font-black italic">৳0</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <h3 class="font-bold text-gray-700 ml-1">সাম্প্রতিক লেনদেনসমূহ:</h3>
                    <div id="report-list" class="space-y-3">
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // আপনার লগইন ডিটেইলস
    const VALID_USER = 'mahrahi'; //
    const VALID_PASS = 'rahi2026';

    function showAdmin() {
        document.getElementById('admin-panel').classList.remove('hidden');
    }

    function closeAdmin() {
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('admin-login-ui').classList.remove('hidden');
        document.getElementById('admin-report-ui').classList.add('hidden');
    }

    async function handleLogin() {
        const user = document.getElementById('admin-user').value;
        const pass = document.getElementById('admin-pass').value;

        if (user === VALID_USER && pass === VALID_PASS) {
            document.getElementById('admin-login-ui').classList.add('hidden');
            document.getElementById('admin-report-ui').classList.remove('hidden');
            loadReport();
        } else {
            alert("ইউজারনেম বা পাসওয়ার্ড ভুল!");
        }
    }

    async function loadReport() {
        const { data, error } = await supabaseClient
            .from('sales')
            .select('*')
            .order('created_at', { ascending: false });

        if (data) {
            const totalRev = data.reduce((s, i) => s + i.total_price, 0);
            document.getElementById('total-count').innerText = data.length + " টি";
            document.getElementById('total-money').innerText = "৳" + totalRev.toLocaleString('bn-BD');
            
            document.getElementById('report-list').innerHTML = data.map(s => `
                <div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div>
                        <span class="text-[10px] font-bold text-blue-500 block uppercase tracking-tighter">অর্ডার আইডি: #${s.id.slice(0,8)}</span>
                        <span class="text-sm font-bold text-gray-700">${new Date(s.created_at).toLocaleDateString('bn-BD')}</span>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black text-emerald-700 font-mono">৳${s.total_price}</span>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">পরিমাণ: ${s.quantity}</p>
                    </div>
                </div>
            `).join('');
        }
    }
</script>
