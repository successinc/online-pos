<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাহী অনলাইন POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-5xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden flex flex-col md:flex-row">
        
        <div class="w-full md:w-2/3 p-6 border-r border-gray-200">
            <h1 class="text-2xl font-bold text-blue-700 mb-6 flex items-center">
                🛒 আমার ডিজিটাল হিসাব
            </h1>
            
            <div id="loading" class="text-center py-10">
                <p class="text-gray-500 animate-pulse">পণ্য লোড হচ্ছে...</p>
            </div>

            <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                </div>
        </div>

        <div class="w-full md:w-1/3 p-6 bg-gray-50">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">বর্তমান বিল</h2>
            
            <div id="cart-list" class="space-y-3 min-h-[300px] max-h-[500px] overflow-y-auto mb-4">
                <p class="text-gray-400 text-center mt-10">কোনো পণ্য সিলেক্ট করা হয়নি</p>
            </div>

            <div class="border-t pt-4 space-y-2">
                <div class="flex justify-between text-lg">
                    <span>মোট আইটেম:</span>
                    <span id="total-items" class="font-bold text-blue-600">0</span>
                </div>
                <div class="flex justify-between text-2xl font-black text-green-700">
                    <span>সর্বমোট:</span>
                    <span>৳<span id="total-price">0</span></span>
                </div>
                
                <button onclick="processSale()" id="pay-btn" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white py-4 rounded-lg font-bold text-xl shadow-lg transition-transform active:scale-95">
                    পেমেন্ট কনফার্ম
                </button>
                
                <button onclick="clearCart()" class="w-full mt-2 text-red-500 text-sm font-semibold hover:underline">
                    সব মুছে ফেলুন
                </button>
            </div>
        </div>
    </div>

    <script>
        // আপনার কানেকশন ডিটেইলস (আমি সেট করে দিয়েছি)
        const URL = 'https://lowdgwnphuptwwoqvyid.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxvd2Rnd25waHVwdHd3b3F2eWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDAzNTUsImV4cCI6MjA4ODU3NjM1NX0.2_YgZ9n3qoAhXW6yveMRNtLaQAM8Vk7-1YFUFe0LWXE';
        
        const supabase = supabase.createClient(URL, KEY);
        let cart = [];

        // ১. ডাটাবেস থেকে পণ্য নিয়ে আসা
        async function fetchProducts() {
            try {
                const { data, error } = await supabase.from('products').select('*');
                if (error) throw error;

                const grid = document.getElementById('product-grid');
                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                if(data.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-red-400">আপনার ডাটাবেসে কোনো পণ্য নেই! Supabase-এ গিয়ে ডাটা এন্ট্রি করুন।</p>';
                    return;
                }

                grid.innerHTML = data.map(p => `
                    <div onclick="addToCart('${p.id}', '${p.name}', ${p.price})" class="cursor-pointer bg-white border-2 border-blue-100 p-4 rounded-lg hover:border-blue-500 hover:shadow-md transition-all">
                        <h3 class="font-bold text-gray-800">${p.name}</h3>
                        <p class="text-blue-600 font-semibold">৳${p.price}</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                alert("ডাটাবেস কানেকশনে সমস্যা হচ্ছে!");
            }
        }

        // ২. কার্টে পণ্য যোগ করা
        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            updateUI();
        }

        // ৩. স্ক্রিন আপডেট করা
        function updateUI() {
            const list = document.getElementById('cart-list');
            const totalItems = document.getElementById('total-items');
            const totalPrice = document.getElementById('total-price');

            if(cart.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center mt-10">কোনো পণ্য সিলেক্ট করা হয়নি</p>';
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="flex justify-between items-center bg-white p-2 rounded shadow-sm border border-gray-100">
                        <div>
                            <span class="font-medium text-gray-700">${item.name}</span>
                            <span class="block text-xs text-gray-400">৳${item.price}</span>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-400 hover:text-red-600 px-2 font-bold">×</button>
                    </div>
                `).join('');
            }

            totalItems.innerText = cart.length;
            totalPrice.innerText = cart.reduce((sum, item) => sum + item.price, 0);
        }

        // ৪. আইটেম রিমুভ করা
        function removeItem(index) {
            cart.splice(index, 1);
            updateUI();
        }

        // ৫. কার্ট ক্লিয়ার করা
        function clearCart() {
            cart = [];
            updateUI();
        }

        // ৬. বিক্রয় সম্পন্ন করা (সিম্পল এলার্ট)
        function processSale() {
            if(cart.length === 0) return alert("আগে পণ্য যোগ করুন!");
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            alert(`ধন্যবাদ! মোট ৳${total} টাকার পেমেন্ট রিসিভ করা হয়েছে।`);
            clearCart();
        }

        // শুরুতেই পণ্য লোড হবে
        fetchProducts();
    </script>
</body>
</html>
