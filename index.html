<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisaFlow POS • Agency Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50/30 min-h-screen font-sans">

    <!-- লগইন পেজ - মডার্ন কার্ড এফেক্ট -->
    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/50">
            <div class="text-center mb-8">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-600 w-20 h-20 rounded-2xl rotate-45 flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-200">
                    <i class="fas fa-passport text-white text-4xl -rotate-45"></i>
                </div>
                <h2 class="text-3xl font-bold bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent">VisaFlow POS</h2>
                <p class="text-slate-500 text-sm mt-2">Agency management dashboard</p>
            </div>
            <div class="space-y-5">
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-slate-400"></i>
                    <input type="text" id="username" placeholder="Username" class="w-full pl-11 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-500 outline-none transition">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
                    <input type="password" id="password" placeholder="Password" class="w-full pl-11 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-500 outline-none transition">
                </div>
                <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-xl font-bold hover:shadow-xl hover:shadow-blue-200 hover:scale-[1.02] transition-all duration-300">
                    <i class="fas fa-arrow-right-to-bracket mr-2"></i> Sign In
                </button>
            </div>
            <p id="loginError" class="text-red-500 text-sm mt-6 hidden text-center font-medium bg-red-50 py-3 rounded-xl">
                <i class="fas fa-circle-exclamation mr-2"></i>Invalid credentials
            </p>
        </div>
    </div>

    <!-- ড্যাশবোর্ড - মডার্ন মিনিমাল ডিজাইন -->
    <div id="dashboardPage" class="hidden">
        <!-- নেভবার - গ্লাস মরফিজম -->
        <nav class="bg-white/80 backdrop-blur-xl border-b border-white/50 shadow-sm sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-br from-blue-600 to-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
                        <i class="fas fa-plane-departure text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent">VisaFlow</h1>
                        <p class="text-xs text-slate-400">Agency POS • Live</p>
                    </div>
                </div>
                <button onclick="handleLogout()" class="flex items-center space-x-2 px-4 py-2 text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all duration-300">
                    <span class="text-sm font-medium">Logout</span>
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </nav>

        <div class="container mx-auto p-4 md:p-6 lg:p-8">
            <!-- স্ট্যাটিসটিক্স কার্ড - অ্যানিমেটেড -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-lg hover:border-blue-100 transition-all duration-300 group">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">Total Clients</p>
                            <h3 id="statTotalClients" class="text-4xl font-bold text-slate-800">0</h3>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-xl group-hover:bg-blue-100 transition">
                            <i class="fas fa-users text-blue-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-lg hover:border-green-100 transition-all duration-300 group">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">Received</p>
                            <h3 id="statTotalReceived" class="text-4xl font-bold text-green-600">0 TK</h3>
                        </div>
                        <div class="bg-green-50 p-3 rounded-xl group-hover:bg-green-100 transition">
                            <i class="fas fa-circle-check text-green-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-lg hover:border-red-100 transition-all duration-300 group">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">Outstanding</p>
                            <h3 id="statTotalDue" class="text-4xl font-bold text-red-600">0 TK</h3>
                        </div>
                        <div class="bg-red-50 p-3 rounded-xl group-hover:bg-red-100 transition">
                            <i class="fas fa-clock text-red-600 text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- মেইন কন্টেন্ট গ্রিড -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- ফর্ম সেকশন - মডার্ন ইনপুট -->
                <div class="lg:col-span-4">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sticky top-24">
                        <div class="flex items-center space-x-3 mb-6">
                            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
                                <i class="fas fa-plus-circle text-white"></i>
                            </div>
                            <h2 class="text-lg font-bold text-slate-800">New Transaction</h2>
                        </div>
                        
                        <form id="visaForm" class="space-y-5">
                            <div class="space-y-1">
                                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Client Details</label>
                                <div class="relative">
                                    <i class="fas fa-user absolute left-4 top-4 text-slate-400"></i>
                                    <input type="text" id="cName" placeholder="e.g. Moldova Group" class="w-full pl-11 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition" required>
                                </div>
                            </div>
                            
                            <div class="space-y-1">
                                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Service</label>
                                <div class="relative">
                                    <i class="fas fa-tag absolute left-4 top-4 text-slate-400"></i>
                                    <input type="text" id="cService" placeholder="e.g. 10 Visa Online" class="w-full pl-11 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition" required>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Total Bill</label>
                                    <div class="relative">
                                        <i class="fas fa-dollar-sign absolute left-4 top-4 text-slate-400"></i>
                                        <input type="number" id="cTotal" placeholder="0.00" class="w-full pl-11 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition" required>
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Paid</label>
                                    <div class="relative">
                                        <i class="fas fa-credit-card absolute left-4 top-4 text-slate-400"></i>
                                        <input type="number" id="cPaid" placeholder="0.00" class="w-full pl-11 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition" required>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-xl font-bold hover:shadow-xl hover:shadow-blue-200 hover:scale-[1.02] transition-all duration-300 flex items-center justify-center space-x-2">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Save Transaction</span>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- টেবিল সেকশন - মডার্ন টেবিল ডিজাইন -->
                <div class="lg:col-span-8">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                            <div class="flex items-center space-x-3">
                                <div class="bg-indigo-50 p-2 rounded-xl">
                                    <i class="fas fa-table-list text-indigo-600"></i>
                                </div>
                                <h2 class="font-bold text-slate-800">Recent Transactions</h2>
                            </div>
                            <span class="text-xs bg-gradient-to-r from-blue-50 to-indigo-50 text-blue-600 px-3 py-2 rounded-xl font-medium flex items-center">
                                <i class="fas fa-cloud mr-2 text-blue-400"></i> Live Sync
                            </span>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="bg-slate-50 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                                        <th class="p-5 text-left">Client</th>
                                        <th class="p-5 text-left">Service</th>
                                        <th class="p-5 text-right">Total</th>
                                        <th class="p-5 text-right">Paid</th>
                                        <th class="p-5 text-right">Due</th>
                                        <th class="p-5 text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="clientTableBody" class="divide-y divide-slate-100 text-sm">
                                    <!-- JavaScript dynamically fills this -->
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- ফুটার - সামারি -->
                        <div class="p-4 bg-slate-50 border-t border-slate-100 text-xs text-slate-400 flex justify-between">
                            <span><i class="far fa-clock mr-1"></i> Real-time updates</span>
                            <span><i class="fas fa-database mr-1"></i> Firebase connected</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // কনফিগারেশন
        const BASE_URL = "https://myvisaagency-af8f1-default-rtdb.firebaseio.com/agency";
        const ADMIN_USER = "success.inc22";
        const ADMIN_PASS = "AmarAirtel*1#";

        // অথেনটিকেশন
        function handleLogin() {
            if(document.getElementById('username').value === ADMIN_USER && document.getElementById('password').value === ADMIN_PASS) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                fetchData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('loginError').classList.add('hidden');
                }, 3000);
            }
        }

        function handleLogout() { 
            location.reload(); 
        }

        // ডেটা সেভ
        document.getElementById('visaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const total = parseFloat(document.getElementById('cTotal').value);
            const paid = parseFloat(document.getElementById('cPaid').value);
            
            const record = {
                name: document.getElementById('cName').value,
                service: document.getElementById('cService').value,
                total: total,
                paid: paid,
                due: total - paid,
                date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }),
                timestamp: Date.now()
            };

            try {
                await fetch(`${BASE_URL}.json`, { 
                    method: 'POST', 
                    body: JSON.stringify(record) 
                });
                
                // সাকসেসফুল সেভের পর ফর্ম রিসেট
                document.getElementById('visaForm').reset();
                fetchData();
                
                // ছোট নোটিফিকেশন (ঐচ্ছিক)
                alert('✅ Transaction saved successfully!');
                
            } catch (error) {
                alert('❌ Error saving transaction');
            }
        });

        // ডেটা লোড
        async function fetchData() {
            try {
                const res = await fetch(`${BASE_URL}.json`);
                const data = await res.json();
                const table = document.getElementById('clientTableBody');
                table.innerHTML = '';
                
                let tCount = 0, tPaid = 0, tDue = 0;

                if(data) {
                    // রিভার্স অর্ডার করে দেখানো (নতুন আগে)
                    Object.keys(data).reverse().forEach(key => {
                        const c = data[key];
                        tCount++; 
                        tPaid += c.paid; 
                        tDue += c.due;

                        // ডুয়ে রঙ কন্ডিশনাল
                        const dueClass = c.due > 0 ? 'text-amber-600' : 'text-green-600';
                        
                        table.innerHTML += `
                            <tr class="hover:bg-blue-50/30 transition-all duration-200">
                                <td class="p-5">
                                    <div class="font-semibold text-slate-800">${c.name}</div>
                                    <div class="text-[11px] text-slate-400 mt-1">${c.date || 'N/A'}</div>
                                </td>
                                <td class="p-5 text-slate-600">${c.service}</td>
                                <td class="p-5 text-right font-medium text-slate-800">৳ ${c.total.toLocaleString()}</td>
                                <td class="p-5 text-right font-medium text-green-600">৳ ${c.paid.toLocaleString()}</td>
                                <td class="p-5 text-right font-medium ${dueClass}">৳ ${c.due.toLocaleString()}</td>
                                <td class="p-5 text-center">
                                    <button onclick="deleteRecord('${key}')" class="text-slate-300 hover:text-red-500 transition-colors duration-200">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    table.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-400"><i class="fas fa-folder-open mr-2"></i>No transactions yet</td></tr>';
                }
                
                document.getElementById('statTotalClients').innerText = tCount;
                document.getElementById('statTotalReceived').innerText = '৳ ' + tPaid.toLocaleString();
                document.getElementById('statTotalDue').innerText = '৳ ' + tDue.toLocaleString();
                
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // রেকর্ড ডিলিট
        async function deleteRecord(key) {
            if(confirm('Are you sure you want to delete this transaction?')) {
                try {
                    await fetch(`${BASE_URL}/${key}.json`, { method: 'DELETE' });
                    fetchData();
                } catch (error) {
                    alert('Error deleting record');
                }
            }
        }
    </script>
</body>
</html>
